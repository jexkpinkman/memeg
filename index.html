<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Motion Particle Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: none;
        }
        canvas { 
            display: block; 
            position: fixed;
            top: 0; left: 0;
            width: 100vw; 
            height: 100vh;
        }
        #video { 
            position: fixed; 
            bottom: 15px; 
            right: 15px; 
            width: 140px; 
            height: 105px; 
            border-radius: 16px; 
            opacity: 0.5;
            transform: scaleX(-1);
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 100;
            display: none;
            object-fit: cover;
        }
        
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0,212,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-title { color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .loading-status { color: #888; font-size: 14px; margin-bottom: 20px; min-height: 20px; text-align: center; padding: 0 20px; }
        .loading-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
        .loading-bar-fill { height: 100%; background: #00d4ff; border-radius: 2px; transition: width 0.3s; width: 0%; }
        .start-btn {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 16px 36px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(0,212,255,0.3);
        }
        .start-btn:active { transform: scale(0.95); }
        .error-box {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            max-width: 320px;
            line-height: 1.7;
            display: none;
            padding: 20px;
            background: rgba(255,68,68,0.08);
            border-radius: 16px;
            border: 1px solid rgba(255,68,68,0.2);
        }
        .fallback-btn {
            background: #ff6b9d;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .ui {
            position: fixed;
            top: 15px;
            left: 15px;
            color: #fff;
            z-index: 100;
            background: rgba(10,10,20,0.85);
            padding: 16px 20px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 300px;
            font-size: 12px;
            line-height: 1.7;
            display: none;
        }
        .ui h3 { color: #00d4ff; margin-bottom: 10px; font-size: 16px; }
        .ui b { color: #fff; }
        .ui .secret { color: #ff6b9d; }
        
        .gesture-box {
            position: fixed;
            bottom: 130px;
            right: 15px;
            color: #fff;
            font-size: 13px;
            background: rgba(10,10,20,0.85);
            padding: 12px 18px;
            border-radius: 16px;
            z-index: 100;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 180px;
            display: none;
        }
        .gesture-box .label { color: #888; font-size: 11px; margin-bottom: 4px; }
        .gesture-box .value { color: #00d4ff; font-weight: 700; font-size: 15px; }
        .gesture-box .value.secret { color: #ff6b9d; }
        
        .mode-indicator {
            position: fixed;
            top: 15px;
            right: 15px;
            color: #00ff88;
            font-size: 12px;
            font-weight: 600;
            z-index: 100;
            background: rgba(0,255,136,0.1);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(0,255,136,0.2);
            display: none;
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loader" id="loader"></div>
    <div class="loading-title">Motion Particle Pro</div>
    <div class="loading-status" id="loadingStatus">Mempersiapkan...</div>
    <div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>

    <div class="error-box" id="errorBox"></div>
</div>

<div class="ui" id="ui">
    <h3>🎮 Kontrol</h3>
    <p id="controlText">
    🖐️ <b>Tangan Terbuka</b> → Partikel halus<br>
    ✊ <b>Kepal</b> → Ledakan<br>
    ✌️ <b>Peace</b> → Hati<br>
    👆 <b>Point</b> → Jejak neon<br>
    ☝️ <b>Kode</b> → <span class="secret">"jexkk kerenn jirr"</span></p>
</div>

<div class="gesture-box" id="gestureBox">
    <div class="label">STATUS</div>
    <div class="value" id="gestureText">Menunggu...</div>
</div>

<div class="mode-indicator" id="modeInd">📷 MODE KAMERA</div>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
// ==================== SETUP ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const video = document.getElementById('video');
const loadingScreen = document.getElementById('loadingScreen');
const loadingStatus = document.getElementById('loadingStatus');
const loadingBar = document.getElementById('loadingBar');
const loader = document.getElementById('loader');
const startBtn = document.getElementById('startBtn');
const errorBox = document.getElementById('errorBox');
const ui = document.getElementById('ui');
const gestureBox = document.getElementById('gestureBox');
const gestureText = document.getElementById('gestureText');
const modeInd = document.getElementById('modeInd');
const controlText = document.getElementById('controlText');

let dpr = Math.min(window.devicePixelRatio || 1, 2);
let W, H;

function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function setProgress(pct, text) {
    loadingBar.style.width = pct + '%';
    loadingStatus.textContent = text;
}

// ==================== PARTICLE SYSTEM ====================
class Particle {
    constructor(x, y, cfg = {}) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * (cfg.speed || 2);
        this.vy = (Math.random() - 0.5) * (cfg.speed || 2);
        this.size = cfg.size || (Math.random() * 2 + 0.5);
        this.life = 1;
        this.maxLife = 1;
        this.decay = cfg.decay || 0.008;
        this.hue = cfg.hue !== undefined ? cfg.hue : Math.random() * 360;
        this.sat = cfg.sat || 85;
        this.light = cfg.light || 65;
        this.trail = [];
        this.maxTrail = cfg.trail || 6;
        this.targetX = null;
        this.targetY = null;
        this.force = cfg.force || 0.04;
        this.friction = cfg.friction || 0.95;
        this.isHeart = false;
        this.heartT = 0;
        this.heartCenterX = 0;
        this.heartCenterY = 0;
        this.type = cfg.type || 'normal'; // normal, heart, explosion, text, vortex, star, wave
        this.age = 0;
        this.rotation = 0;
        this.rotSpeed = (Math.random() - 0.5) * 0.1;
    }

    setTarget(x, y) {
        this.targetX = x;
        this.targetY = y;
    }

    update() {
        this.age++;
        this.trail.push({ x: this.x, y: this.y, life: this.life });
        if (this.trail.length > this.maxTrail) this.trail.shift();

        if (this.isHeart) {
            // Heart particles follow heart curve
            const t = this.heartT + Date.now() * 0.001;
            const scale = 8;
            const hx = this.heartCenterX + 16 * scale * Math.pow(Math.sin(t), 3);
            const hy = this.heartCenterY - scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            this.vx += (hx - this.x) * 0.04;
            this.vy += (hy - this.y) * 0.04;
            this.vx *= 0.9;
            this.vy *= 0.9;
            this.x += this.vx;
            this.y += this.vy;
            
            // Heart fades slowly when gesture changes
            this.life -= 0.003;
            this.hue = 330 + Math.sin(t * 3) * 40;
        } 
        else if (this.type === 'vortex') {
            // Spiral vortex effect
            this.rotation += this.rotSpeed * 5;
            const radius = this.age * 0.5 + 20;
            const vx = this.heartCenterX + Math.cos(this.rotation) * radius;
            const vy = this.heartCenterY + Math.sin(this.rotation) * radius;
            this.vx += (vx - this.x) * 0.05;
            this.vy += (vy - this.y) * 0.05;
            this.vx *= 0.92;
            this.vy *= 0.92;
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.006;
            this.hue = (this.hue + 2) % 360;
        }
        else if (this.type === 'star') {
            // Star burst effect
            this.vx *= 0.96;
            this.vy *= 0.96;
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.01;
            this.size *= 0.99;
            this.hue += 1;
        }
        else if (this.type === 'wave') {
            // Wave/float effect
            this.vx += Math.sin(this.age * 0.05) * 0.2;
            this.vy += Math.cos(this.age * 0.05) * 0.2;
            this.vx *= 0.95;
            this.vy *= 0.95;
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.005;
            this.hue = (this.hue + 0.5) % 360;
        }
        else if (this.type === 'text') {
            // Text aura particles
            if (this.targetX !== null) {
                this.vx += (this.targetX - this.x) * 0.06;
                this.vy += (this.targetY - this.y) * 0.06;
            }
            this.vx *= 0.9;
            this.vy *= 0.9;
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.008;
            this.hue += 1.5;
        }
        else {
            // Normal follow
            if (this.targetX !== null) {
                this.vx += (this.targetX - this.x) * this.force;
                this.vy += (this.targetY - this.y) * this.force;
            }
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            this.hue += 0.3;
        }
    }

    draw(ctx) {
        const a = Math.max(0, this.life);
        if (a <= 0) return;
        
        // Trail
        for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const ta = (i / this.trail.length) * a * 0.4;
            if (ta <= 0) continue;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.size * (i/this.trail.length) * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${ta})`;
            ctx.fill();
        }

        // Core glow
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light + 15}%, ${a})`;
        ctx.fill();

        // Outer glow
        const glowSize = this.isHeart ? 8 : (this.type === 'vortex' ? 5 : 3);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * glowSize * a, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${a * 0.15})`;
        ctx.fill();
        
        // Extra glow for special types
        if (this.type === 'text' || this.isHeart) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 12 * a, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${a * 0.05})`;
            ctx.fill();
        }
    }
}

// ==================== TEXT PARTICLE ====================
class TextParticle {
    constructor(x, y, char, hue, delay = 0) {
        this.x = x + (Math.random() - 0.5) * 150;
        this.y = y + (Math.random() - 0.5) * 150;
        this.targetX = x;
        this.targetY = y;
        this.char = char;
        this.hue = hue;
        this.life = 0;
        this.delay = delay;
        this.delayTimer = 0;
        this.size = 0;
        this.targetSize = 28 + Math.random() * 8;
        this.vx = 0;
        this.vy = 0;
        this.shake = 0;
        this.pulse = 0;
    }

    update() {
        if (this.delayTimer < this.delay) {
            this.delayTimer++;
            return;
        }
        
        if (this.life < 1) this.life += 0.03;
        
        // Smooth approach to target
        this.vx += (this.targetX - this.x) * 0.06;
        this.vy += (this.targetY - this.y) * 0.06;
        this.vx *= 0.88;
        this.vy *= 0.88;
        this.x += this.vx;
        this.y += this.vy;
        
        this.size += (this.targetSize - this.size) * 0.08;
        this.shake = Math.sin(Date.now() * 0.008 + this.x) * 1.5;
        this.pulse = Math.sin(Date.now() * 0.003 + this.hue) * 0.1 + 1;
        this.hue += 0.6;
    }

    draw(ctx) {
        if (this.delayTimer < this.delay) return;
        
        const a = Math.min(1, this.life);
        const pulseSize = this.size * this.pulse;
        
        ctx.save();
        ctx.font = `bold ${pulseSize}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Multiple glow layers
        ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, ${a * 0.8})`;
        ctx.shadowBlur = 25;
        ctx.fillStyle = `hsla(${this.hue}, 95%, 80%, ${a})`;
        ctx.fillText(this.char, this.x + this.shake, this.y);
        
        ctx.shadowBlur = 50;
        ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${a * 0.5})`;
        ctx.fillText(this.char, this.x + this.shake, this.y);
        
        ctx.restore();
    }
}

// ==================== STATE ====================
let particles = [];
let textParticles = [];
let handPos = { x: W/2, y: H/2 };
let currentGesture = 'none';
let prevGesture = 'none';
let isHandDetected = false;
let secretActive = false;
let secretTimer = 0;
let mode = 'loading';
let gestureHoldTime = 0;

// ==================== TOUCH/MOUSE ====================
let touchPos = { x: W/2, y: H/2 };
let isTouching = false;
let touchGesture = 'open';
let lastTap = 0;

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    isTouching = true;
    const t = e.touches[0];
    touchPos.x = t.clientX;
    touchPos.y = t.clientY;
    
    // Two finger = peace/heart
    if (e.touches.length === 2) {
        touchGesture = 'peace';
        spawnHeart(touchPos.x, touchPos.y);
        updateUI('peace');
    }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchPos.x = t.clientX;
    touchPos.y = t.clientY;
}, {passive: false});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    isTouching = false;
    touchGesture = 'open';
    
    // Double tap = fist/explosion
    const now = Date.now();
    if (now - lastTap < 300) {
        touchGesture = 'fist';
        spawnExplosion(touchPos.x, touchPos.y);
        updateUI('fist');
        setTimeout(() => { touchGesture = 'open'; updateUI('touch'); }, 600);
    }
    lastTap = now;
});

canvas.addEventListener('mousedown', e => {
    isTouching = true;
    touchPos.x = e.clientX;
    touchPos.y = e.clientY;
});
canvas.addEventListener('mousemove', e => {
    if (isTouching) { touchPos.x = e.clientX; touchPos.y = e.clientY; }
});
canvas.addEventListener('mouseup', () => { isTouching = false; });

// ==================== SPAWN FUNCTIONS ====================
function spawnParticles(x, y, count, cfg) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(
            x + (Math.random() - 0.5) * (cfg.spread || 30),
            y + (Math.random() - 0.5) * (cfg.spread || 30),
            cfg
        ));
    }
}

function spawnHeart(cx, cy) {
    // Clear old heart particles
    particles = particles.filter(p => !p.isHeart);
    
    for (let i = 0; i < 60; i++) {
        const t = (i / 60) * Math.PI * 2;
        const p = new Particle(cx, cy, { 
            hue: 330, sat: 95, light: 75, size: 3, 
            decay: 0.002, friction: 0.93, trail: 12,
            type: 'heart'
        });
        p.isHeart = true;
        p.heartT = t;
        p.heartCenterX = cx;
        p.heartCenterY = cy;
        particles.push(p);
    }
}

function spawnExplosion(x, y) {
    spawnParticles(x, y, 80, { 
        hue: Math.random() * 60, speed: 12, spread: 10, 
        decay: 0.02, size: 4, friction: 0.9, trail: 6,
        type: 'star'
    });
}

function spawnVortex(x, y) {
    for (let i = 0; i < 40; i++) {
        const p = new Particle(x, y, {
            hue: 200 + Math.random() * 60, speed: 3, spread: 5,
            decay: 0.005, friction: 0.92, trail: 10,
            type: 'vortex'
        });
        p.heartCenterX = x;
        p.heartCenterY = y;
        p.rotSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.05 + Math.random() * 0.05);
        particles.push(p);
    }
}

function spawnWave(x, y) {
    spawnParticles(x, y, 30, {
        hue: 160 + Math.random() * 40, speed: 2, spread: 50,
        decay: 0.004, friction: 0.94, trail: 8,
        type: 'wave'
    });
}

function spawnTextEffect(text, cx, cy) {
    textParticles = [];
    const chars = text.split('');
    const tw = chars.length * 36;
    
    // Spawn aura particles around text
    for (let i = 0; i < 50; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 80 + Math.random() * 60;
        const px = cx + Math.cos(angle) * radius;
        const py = cy + Math.sin(angle) * radius;
        const p = new Particle(px, py, {
            hue: 280 + Math.random() * 60, speed: 1, spread: 0,
            decay: 0.006, friction: 0.9, trail: 8,
            type: 'text'
        });
        p.targetX = cx + (Math.random() - 0.5) * tw;
        p.targetY = cy + (Math.random() - 0.5) * 40;
        particles.push(p);
    }
    
    // Text characters
    chars.forEach((c, i) => {
        const tp = new TextParticle(
            cx - tw/2 + i * 36, 
            cy, 
            c, 
            280 + i * 25,
            i * 5 // stagger delay
        );
        textParticles.push(tp);
    });
}

// ==================== GESTURE DETECTION ====================
function detectGesture(lm) {
    const wrist = lm[0];
    const indexTip = lm[8], indexPip = lm[6];
    const middleTip = lm[12], middlePip = lm[10];
    const ringTip = lm[16], ringPip = lm[14];
    const pinkyTip = lm[20], pinkyPip = lm[18];
    const thumbTip = lm[4], thumbIp = lm[3];

    // Finger up = tip above pip (y decreases upward)
    const indexUp = indexTip.y < indexPip.y;
    const middleUp = middleTip.y < middlePip.y;
    const ringUp = ringTip.y < ringPip.y;
    const pinkyUp = pinkyTip.y < pinkyPip.y;
    const thumbUp = thumbTip.x < thumbIp.x; // Thumb check based on x for right hand

    const count = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

    // SECRET CODE: Index + Middle DOWN, Ring + Pinky UP
    if (!indexUp && !middleUp && ringUp && pinkyUp) return 'secret';
    
    // PEACE: Index + Middle UP, Ring + Pinky DOWN
    if (indexUp && middleUp && !ringUp && !pinkyUp) return 'peace';
    
    // POINT: Only Index UP
    if (indexUp && !middleUp && !ringUp && !pinkyUp) return 'point';
    
    // FIST: All down
    if (count === 0) return 'fist';
    
    // SHAKA: Thumb + Pinky up, others down
    if (thumbUp && !indexUp && !middleUp && !ringUp && pinkyUp) return 'shaka';
    
    // LOVE YOU: Index + Pinky up, Middle + Ring down
    if (indexUp && !middleUp && !ringUp && pinkyUp) return 'loveyou';
    
    // ROCK: Index + Middle + Pinky up, Ring down
    if (indexUp && middleUp && !ringUp && pinkyUp) return 'rock';
    
    // OPEN: 4 fingers up
    if (count >= 4) return 'open';
    
    return 'unknown';
}

function updateUI(g) {
    const names = {
        none: '❌ Tidak Terdeteksi', open: '🖐️ Tangan Terbuka',
        fist: '✊ Kepal!', peace: '✌️ Peace', point: '👆 Menunjuk',
        shaka: '🤙 Shaka!', loveyou: '🤟 Love You!', rock: '🤘 Rock!',
        secret: '🔥 JEXKK KERENN!', unknown: '🤔...',
        touch: '👆 Touch Mode'
    };
    gestureText.textContent = names[g] || g;
    gestureText.className = 'value' + (g === 'secret' ? ' secret' : '');
}

// ==================== CAMERA ====================
async function startCamera() {
    setProgress(60, 'Mengakses kamera...');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: 640, height: 480 } 
        });
        stream.getTracks().forEach(t => t.stop());
        
        setProgress(75, 'Load AI...');
        
        // Load scripts
        const scripts = [
            'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js'
        ];
        
        for (const src of scripts) {
            await new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.crossOrigin = 'anonymous';
                s.onload = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }
        
        setProgress(90, 'Init AI...');
        
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onHandResults);
        
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640,
            height: 480
        });
        
        await camera.start();
        
        mode = 'camera';
        video.style.display = 'block';
        modeInd.textContent = '📷 MODE KAMERA';
        modeInd.style.display = 'block';
        finishLoad();
        
    } catch (err) {
        console.error(err);
        showError('Kamera gagal. Beralih ke Touch Mode...', true);
    }
}

function onHandResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        isHandDetected = true;
        const lm = results.multiHandLandmarks[0];
        
        // Smooth hand tracking
        const rawX = (1 - lm[9].x) * W;
        const rawY = lm[9].y * H;
        handPos.x += (rawX - handPos.x) * 0.3;
        handPos.y += (rawY - handPos.y) * 0.3;
        
        const newG = detectGesture(lm);
        
        // Track gesture hold time
        if (newG === currentGesture) {
            gestureHoldTime++;
        } else {
            gestureHoldTime = 0;
            prevGesture = currentGesture;
            currentGesture = newG;
            updateUI(newG);
            
            // Trigger on gesture change
            handleGestureChange(newG, handPos.x, handPos.y);
        }
        
        // Continuous effects
        handleGestureContinuous(newG, handPos.x, handPos.y);
        
    } else {
        isHandDetected = false;
        if (currentGesture !== 'none') {
            currentGesture = 'none';
            updateUI('none');
        }
    }
}

function handleGestureChange(g, x, y) {
    switch(g) {
        case 'peace':
            spawnHeart(x, y);
            break;
        case 'secret':
            secretActive = true;
            secretTimer = 400;
            spawnTextEffect('jexkk kerenn jirr', W/2, H/2);
            spawnExplosion(W/2, H/2);
            break;
        case 'fist':
            spawnExplosion(x, y);
            break;
        case 'shaka':
            spawnVortex(x, y);
            break;
        case 'loveyou':
            spawnWave(x, y);
            break;
        case 'rock':
            spawnParticles(x, y, 60, { 
                hue: Math.random()*360, speed: 8, spread: 30, 
                decay: 0.015, size: 3, type: 'star' 
            });
            break;
    }
}

function handleGestureContinuous(g, x, y) {
    const rates = { open: 0.4, point: 0.6, peace: 0.15, fist: 0.5, 
                   shaka: 0.3, loveyou: 0.3, rock: 0.4, secret: 0.9 };
    
    if (Math.random() < (rates[g] || 0.2)) {
        const cfgs = {
            open: { hue: 180+Math.random()*60, speed: 1.5, spread: 40, trail: 6 },
            point: { hue: Date.now()*0.05%360, speed: 2, spread: 15, trail: 10 },
            peace: { hue: 330+Math.random()*30, speed: 0.8, spread: 20, decay: 0.003 },
            fist: { hue: Math.random()*50, speed: 4, spread: 40, decay: 0.018, size: 3 },
            shaka: { hue: 200+Math.random()*60, speed: 2, spread: 35, trail: 8, type: 'wave' },
            loveyou: { hue: 45+Math.random()*20, speed: 2, spread: 30, trail: 8 },
            rock: { hue: Math.random()*360, speed: 3, spread: 40, decay: 0.012 },
            secret: { hue: 280+Math.random()*60, speed: 4, spread: 60, decay: 0.008, size: 2.5008, size: 2.5 }
        };
        spawnParticles(x, y, 2, cfgs[g] || {});
    }
}

// ==================== TOUCH MODE ====================
function startTouchMode() {
    mode = 'touch';
    controlText.innerHTML = `👆 <b>Geser jari</b> → Partikel ngikut<br>
    👆👆 <b>Tap 2x</b> → Ledakan!<br>
    ✌️ <b>2 Jari</b> → Hati<br>
    ☝️ <b>Kode</b> → <span class="secret">"jexkk kerenn jirr"</span>`;
    
    modeInd.textContent = '👆 MODE TOUCH';
    modeInd.style.display = 'block';
    modeInd.style.color = '#ff6b9d';
    modeInd.style.borderColor = 'rgba(255,107,157,0.2)';
    modeInd.style.background = 'rgba(255,107,157,0.1)';
    finishLoad();
}

// ==================== UI HELPERS ====================
function finishLoad() {
    setTimeout(() => {
        loadingScreen.classList.add('hidden');
        ui.style.display = 'block';
        gestureBox.style.display = 'block';
    }, 400);
}

function showError(msg, showFallback) {
    loader.style.display = 'none';
    loadingBar.parentElement.style.display = 'none';
    loadingStatus.style.display = 'none';
    errorBox.style.display = 'block';
    
    let html = msg.replace(/\n/g, '<br>');
    if (showFallback) {
        html += `<br><br><button class="fallback-btn" onclick="startTouchMode()">👆 Pakai Mode Touch</button>`;
    }
    errorBox.innerHTML = html;
}

// ==================== MAIN LOOP ====================
function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
    ctx.fillRect(0, 0, W, H);
    
    // Secret timer
    if (secretActive) {
        secretTimer--;
        if (secretTimer <= 0) {
            secretActive = false;
            textParticles = [];
            // Fade out remaining text aura particles
            particles.forEach(p => {
                if (p.type === 'text') p.life -= 0.02;
            });
        }
    }
    
    // Determine active position
    let activePos, activeGesture;
    if (mode === 'camera' && isHandDetected) {
        activePos = handPos;
        activeGesture = currentGesture;
    } else if (mode === 'touch' && isTouching) {
        activePos = touchPos;
        activeGesture = touchGesture;
    } else {
        activePos = null;
        activeGesture = 'none';
    }
    
    // Update particles - hearts fade when gesture changes
    particles = particles.filter(p => {
        // If gesture changed from peace, make hearts fade faster
        if (p.isHeart && activeGesture !== 'peace') {
            p.life -= 0.015;
        }
        
        if (!p.isHeart && p.type !== 'text' && activePos) {
            p.setTarget(activePos.x, activePos.y);
        }
        
        p.update();
        p.draw(ctx);
        return p.life > 0;
    });
    
    // Limit particles
    if (particles.length > 600) particles = particles.slice(-600);
    
    // Text particles
    textParticles = textParticles.filter(tp => {
        tp.update();
        tp.draw(ctx);
        return tp.life < 1 || tp.delayTimer < tp.delay;
    });
    
    // Connection lines for open hand
    if (activeGesture === 'open' && particles.length > 20) {
        ctx.beginPath();
        ctx.strokeStyle = `hsla(${(Date.now()*0.02)%360}, 70%, 60%, 0.06)`;
        ctx.lineWidth = 0.8;
        const step = Math.max(1, Math.floor(particles.length / 100));
        for (let i = 0; i < particles.length; i += step) {
            for (let j = i + step; j < particles.length; j += step) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                if (dx*dx + dy*dy < 8000) {
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                }
            }
        }
        ctx.stroke();
    }
    
    // Ambient particles when idle
    if (!activePos && Math.random() < 0.04) {
        spawnParticles(Math.random()*W, Math.random()*H, 1, { 
            hue: Math.random()*360, speed: 0.3, spread: 0, 
            decay: 0.002, size: 0.8 
        });
    }
    
    requestAnimationFrame(animate);
}

// ==================== INIT ====================
startBtn.addEventListener('click', startCamera);

(async function init() {
    setProgress(20, 'Cek koneksi...');
    if (!navigator.onLine) {
        showError('❌ Offline!\nNyalain internet atau pakai Touch Mode.', true);
        return;
    }
    setProgress(55, 'Klik tombol untuk mulai');
    loader.style.display = 'none';
    startBtn.style.display = 'block';
})();

animate();
</script>
